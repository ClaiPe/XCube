include_configs:
  - ../train/diffusion/diffusion_16x16x16_dense.yaml
  - dales2.yaml

name: 'dales2/diffusion_dense'

vae_config: "configs/dales2/train_vae_dense.yaml"
vae_checkpoint: "checkpoints/dales2/VAE_dense/version_0/checkpoints/last.ckpt"

model_precision: 32

batch_size: 6
accumulate_grad_batches: 4
max_epochs: 50

# adjust data setting
voxel_size: 0.4  # 100m crop / 256 ≈ 0.4m per voxel
crop_size: 100
resolution: 256

learning_rate:
  init: 1.0e-5

# adjust network
network:
  diffuser:
    image_size: 32 # use during testing
    model_channels: 160
    attention_resolutions: [1, 2, 4, 8]