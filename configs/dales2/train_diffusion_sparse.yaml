include_configs:
  - ../train/diffusion/diffusion_sparse.yaml
  - dales2.yaml

name: 'dales2/diffusion_sparse'

# runtime defaults (used by train.py if CLI flags are omitted)
gpus: 1
batch_size: 8
max_epochs: 100

# semantic concat cond
use_semantic_cond: true
num_classes: 15
conditioning_key: "concat" # "none", "adm", "concat"

use_pos_embed_world: false
use_pos_embed_high: true

vae_config: "configs/dales2/train_vae_sparse.yaml"
vae_checkpoint: "checkpoints/dales2/fine_vae/last.ckpt"

network:
  diffuser:
    image_size: [256, 256, 64]
    model_channels: 64
    channel_mult: [1, 2, 4, 4]
    attention_resolutions: [8, 16]
  cond_stage_model:
    target: "SemanticEncoder"
    params:
      num_semantic: 15 
      dim_semantic: 32