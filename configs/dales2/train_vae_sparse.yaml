include_configs:
  - ../train/vae/vae_128x128x128_sparse.yaml
  - dales2.yaml

name: 'dales2/VAE_sparse'

# runtime defaults (used by train.py if CLI flags are omitted)
gpus: 1
batch_size: 8
max_epochs: 100

# adjust data setting
voxel_size: 0.1  # 100m crop / 1024 = 0.1m per voxel
resolution: 1024

# adjust input setting - use semantic and intensity
use_input_semantic: true
use_input_intensity: false
num_semantic: 15
dim_semantic: 32

# adjust supervision - add semantic supervision
kl_weight: 0.3
kl_weight_max: 0.3
supervision:
  semantic_weight: 20.0

# adjust network
cut_ratio: 16

network:
  unet:
    params:
      neck_bound: [128, 128, 32]